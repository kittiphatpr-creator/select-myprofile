<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>นามบัตรออนไลน์ของฉัน</title>
 
  <!-- Google Fonts: Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
 
  <!-- CSS ภายนอก: สังเกตว่าเป็น relative path (./) -->
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="card">
    <img class="card__avatar" src="https://avatars.githubusercontent.com/u/9919?v=4" alt="รูปโปรไฟล์">
    <h1 id="card-name" class="card__name">kittiphat</h1>
    <p class="card__title">นักศึกษาวิศวกรรมคอมพิวเตอร์</p>
    <p class="card__bio">กำลังเรียนรู้ หัวข้อพิเศษทางด้านการพัฒนาซอฟต์แวร์</p>
 
    <ul class="card__links">
      <li><a href="https://github.com/kittiphatpr-creator">GitHub</a></li>
      <li><a href="kittiphat.pr@ksu.ac.th">Email</a></li>
    </ul>

    <button id="theme-toggle" class="card__button">🌙 โหมดกลางคืน</button>

    <p class="card__message">หัวข้อพิเศษซอฟต์แวร์</p>

    <footer id="card-footer" class="card__footer"></footer>
    <div class="message-box">
    <input
    type="text"
    id="name-input"
    placeholder="💬 พิมพ์ชื่อของคุณ..."
>
</div>
  </main>
 
  <!-- JS ภายนอก: วางท้าย body เสมอ -->
  <script src="./script.js"></script>
</body>
</html>
